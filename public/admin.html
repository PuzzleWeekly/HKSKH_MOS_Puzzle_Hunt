<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>軌郭山陣法管理樞紐 (Admin)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Serif TC', serif; background-color: #fcf8f2; }
  </style>
</head>
<body class="p-4 sm:p-8">

  <div class="max-w-4xl mx-auto bg-white p-6 sm:p-8 rounded-lg shadow-xl border border-gray-200">
    <div class="flex flex-col sm:flex-row justify-between items-center border-b pb-4 mb-6">
      <h1 class="text-3xl font-bold text-gray-800">軌郭山 - 陣法管理樞紐</h1>
      <button onclick="fetchTeams()" class="mt-4 sm:mt-0 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded shadow flex items-center gap-2">
        重新整理進度
      </button>
    </div>

    <div class="bg-blue-50 p-6 rounded-lg border border-blue-100 mb-8">
      <h2 class="text-xl font-bold text-blue-900 mb-4">派發新通關令牌 (新增隊伍)</h2>
      <form onsubmit="addTeam(event)" class="flex flex-col sm:flex-row gap-4">
        <input type="text" name="newCode" required placeholder="例如：TEAM-A, MOS2026..." class="flex-1 p-3 border rounded focus:ring-2 focus:ring-blue-500 uppercase font-mono">
        <button type="submit" class="bg-green-600 hover:bg-green-700 text-white font-bold px-6 py-3 rounded shadow">
          建立陣法結界
        </button>
      </form>
      <div id="add-msg" class="mt-2 text-sm font-bold"></div>
    </div>

    <div>
      <h2 class="text-xl font-bold text-gray-800 mb-4">各路修士通關狀況</h2>
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-gray-100 border-b-2 border-gray-300">
              <th class="p-3 font-bold text-gray-700">通關令牌 (Team Code)</th>
              <th class="p-3 font-bold text-gray-700">目前關卡</th>
              <th class="p-3 font-bold text-gray-700">隊員數量</th>
              <th class="p-3 font-bold text-gray-700">操作</th>
            </tr>
          </thead>
          <tbody id="team-list" class="divide-y divide-gray-200">
            <tr><td colspan="4" class="p-4 text-center text-gray-500">載入中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, setDoc, getDocs, updateDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBadB--5Es1xkGaS3qFFepNVySVyQEMIZg",
      authDomain: "hkskh-mos-puzzle-hunt.firebaseapp.com",
      projectId: "hkskh-mos-puzzle-hunt",
      storageBucket: "hkskh-mos-puzzle-hunt.firebasestorage.app",
      messagingSenderId: "947464222339",
      appId: "1:947464222339:web:55f8ba8e12ed20a8060db6",
      measurementId: "G-NX03J1BJEM"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 取得並顯示所有隊伍資料
    window.fetchTeams = async () => {
      const tbody = document.getElementById('team-list');
      tbody.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-gray-500">同步靈力中...</td></tr>';
      
      try {
        const querySnapshot = await getDocs(collection(db, "teams"));
        tbody.innerHTML = '';
        
        if(querySnapshot.empty) {
          tbody.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-gray-500">目前尚無任何通關令牌記錄。</td></tr>';
          return;
        }

        querySnapshot.forEach((docSnap) => {
          const data = docSnap.data();
          const membersCount = data.members ? data.members.length : 0;
          let stageLabel = data.stage;
          if (data.stage === 8) stageLabel = "8 (通關-好結局)";
          if (data.stage === 9) stageLabel = "9 (通關-壞結局)";

          const row = `
            <tr class="hover:bg-gray-50">
              <td class="p-3 font-mono font-bold text-blue-800">${docSnap.id}</td>
              <td class="p-3"><span class="bg-gray-200 px-2 py-1 rounded text-sm">${stageLabel}</span></td>
              <td class="p-3">${membersCount} 人</td>
              <td class="p-3">
                <button onclick="resetTeam('${docSnap.id}')" class="text-sm text-red-600 hover:text-red-800 border border-red-200 hover:bg-red-50 px-3 py-1 rounded transition-colors">
                  重置回起點(關卡0)
                </button>
              </td>
            </tr>
          `;
          tbody.insertAdjacentHTML('beforeend', row);
        });
      } catch(err) {
        console.error(err);
        tbody.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-red-500">讀取失敗，請檢查權限設定。</td></tr>';
      }
    };

    // 新增隊伍令牌
    window.addTeam = async (e) => {
      e.preventDefault();
      const code = e.target.newCode.value.trim().toUpperCase();
      const msgDiv = document.getElementById('add-msg');
      msgDiv.innerText = "建立中..."; msgDiv.className = "mt-2 text-sm font-bold text-blue-600";
      
      try {
        await setDoc(doc(db, "teams", code), {
          stage: 0,
          members: []
        });
        msgDiv.innerText = `成功建立令牌：${code}`;
        msgDiv.className = "mt-2 text-sm font-bold text-green-600";
        e.target.reset();
        fetchTeams(); // 重新整理列表
      } catch (err) {
        msgDiv.innerText = "建立失敗！";
        msgDiv.className = "mt-2 text-sm font-bold text-red-600";
        console.error(err);
      }
    };

    // 重置隊伍進度
    window.resetTeam = async (code) => {
      if(confirm(`確定要將隊伍 [${code}] 重置回起始點(關卡0)嗎？此動作將同步影響該隊所有玩家！`)) {
        try {
          await updateDoc(doc(db, "teams", code), { stage: 0 });
          alert("重置成功！");
          fetchTeams();
        } catch (err) {
          alert("重置失敗！");
          console.error(err);
        }
      }
    };

    // 初始化載入
    fetchTeams();

  </script>
</body>
</html>
